# ┌──────────────────────────────────────────────┐
# │ tmux config — Pi Agent Persistence Layer       │
# │ Prefix: C-a | Mouse: on | 256 color           │
# └──────────────────────────────────────────────┘

# ===== 基础 =====
set -g default-terminal "tmux-256color"
set -g mouse on

# Pi Agent 必需：tmux 默认会剥离修饰键（Shift+Enter→Enter），
# 启用扩展键报告 (CSI-u 格式) 让 Pi 能区分 Ctrl/Shift/Alt 组合键
# 参考：https://pi.dev/docs/latest/tmux
set -g extended-keys on
set -g extended-keys-format csi-u

# ===== 外观 =====
set -g status-position bottom
set -g status-style bg=#1e1e2e,fg=#cdd6f4
set -g status-left-length 40
set -g status-right-length 60

# 左侧：session 名 + 当前目录
set -g status-left "#[bg=#a6e3a1,fg=#1e1e2e] #S #[bg=#45475a,fg=#cdd6f4] #{pane_current_path} "

# 右侧：窗口列表
setw -g window-status-format "#[fg=#6c7086]#I:#W"
setw -g window-status-current-format "#[bg=#89b4fa,fg=#1e1e2e] #I:#W "
set -g status-right "#[fg=#585b70] %Y-%m-%d %H:%M "

# ===== 性能 =====
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on

# ===== 剪贴板 =====
# OSC 52 同步到系统剪贴板（WezTerm 原生支持，鼠标选中即同步）
set -g set-clipboard on

# Fallback: 手动复制到 Windows 剪贴板（prefix + Ctrl+c）
bind C-c run "tmux save-buffer - | clip.exe"

# ===== 快捷键 =====
# Prefix: Ctrl+a（比默认 Ctrl+b 好按）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 窗格分割（与 WezTerm 按键一致）
bind d split-window -h -c "#{pane_current_path}"   # Alt+d 不行，用 prefix d
bind D split-window -v -c "#{pane_current_path}"   # prefix D 竖分
bind z resize-pane -Z                                # prefix z 全屏

# 窗格导航（vim 风格）
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 快速重载配置
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# 窗格大小调整（保持与 WezTerm 一致）
bind -r Left   resize-pane -L 3
bind -r Right  resize-pane -R 3
bind -r Up     resize-pane -U 3
bind -r Down   resize-pane -D 3

# 窗口管理
bind c new-window -c "#{pane_current_path}"
bind x kill-pane
bind & kill-window
